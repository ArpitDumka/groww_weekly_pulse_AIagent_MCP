name: Weekly Review Pulse

# Runs the full pipeline once a week and on demand:
#   ingest (fresh reviews) -> scrub -> cluster + summarize -> deliver via MCP
#
# Delivery uses "Option A": the Google MCP server runs INSIDE this runner and
# Phase 4 calls it over loopback (http://127.0.0.1:8000). Google OAuth comes
# from repo secrets — no interactive login and no separately hosted service.

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the pulse but skip Google delivery"
        type: boolean
        default: false
      fetch_count:
        description: "Reviews to fetch per store"
        type: string
        default: "20000"

concurrency:
  group: weekly-pulse
  cancel-in-progress: false

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout pulse pipeline
        uses: actions/checkout@v4
        with:
          # Needed so the dashboard commit can push back to main (Vercel redeploy).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      # Persist the accumulated corpus across weekly runs. A fresh key each run
      # forces the post-job save; restore-keys falls back to the most recent
      # prior corpus so the review set keeps growing week over week.
      - name: Restore accumulated corpus
        uses: actions/cache@v4
        with:
          path: phase-1-review-ingest/data/output/corpus.json
          key: review-corpus-${{ github.run_id }}
          restore-keys: |
            review-corpus-

      # ---- Option A: bring up the Google MCP server inside this runner ----
      - name: Checkout Google MCP server
        uses: actions/checkout@v4
        with:
          repository: ArpitDumka/Google-mcp-server
          path: mcp-server

      - name: Overlay FastAPI REST entrypoint
        run: cp phase-5-orchestration/ci/server.py mcp-server/server.py

      - name: Install MCP server dependencies
        run: pip install -r mcp-server/requirements.txt

      - name: Start MCP server (background)
        working-directory: mcp-server
        env:
          IS_DEPLOYED: "1"
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          # credentials.json is only needed as a fallback; token.json carries
          # the refresh token used by the deployed (non-interactive) auth path.
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json; fi
          if [ -n "$GOOGLE_TOKEN_JSON" ]; then printf '%s' "$GOOGLE_TOKEN_JSON" > token.json; fi
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 > "$GITHUB_WORKSPACE/mcp-server.log" 2>&1 &
          echo "Started MCP server (pid $!)"

      - name: Wait for MCP server health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health; then echo "\nMCP server is up"; exit 0; fi
            sleep 2
          done
          echo "MCP server did not become healthy"; cat mcp-server.log; exit 1

      # ---- Set up and run the pipeline ----
      - name: Set up phase virtualenvs
        run: python phase-5-orchestration/scripts/run_weekly_pulse.py --setup

      - name: Run weekly pulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          MCP_SERVER_BASE_URL: "http://127.0.0.1:8000"
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          PULSE_FETCH_COUNT: ${{ inputs.fetch_count || '20000' }}
        run: |
          python phase-5-orchestration/scripts/run_weekly_pulse.py \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      # Path 2: static dashboard → public/index.html → push → Vercel redeploys
      - name: Export dashboard HTML for Vercel
        run: |
          python phase-3-theme-summarize/scripts/serve_pulse.py \
            --pulse phase-3-theme-summarize/data/output/pulse.json \
            --export public/index.html

      - name: Commit and push corpus + dashboard (triggers Vercel)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html phase-1-review-ingest/data/output/corpus.json
          if git diff --staged --quiet; then
            echo "Corpus/dashboard unchanged — skip push"
            exit 0
          fi
          git commit -m "chore: append corpus + update public dashboard after weekly pulse [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-artifacts
          path: |
            phase-1-review-ingest/data/output/corpus.json
            phase-3-theme-summarize/data/output/pulse.json
            phase-4-mcp-deliver/data/output/delivery_result.json
            public/index.html
            mcp-server.log
          if-no-files-found: warn
